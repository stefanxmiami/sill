name: Build & Release

# Tag a version to build installers for both platforms and publish a release:
#   npm version patch        # bumps package.json + creates a git tag
#   git push --follow-tags
# Or run manually (workflow_dispatch) to just build artifacts without releasing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact: sill-windows
          - os: macos-latest
            script: build:mac
            artifact: sill-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # keep the built artifact's version in step with the tag (v1.2.3 -> 1.2.3)
      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build
        shell: bash
        run: npm run ${{ matrix.script }}
        env:
          # unsigned build; don't let electron-builder hunt for a certificate
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/*Setup*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
