<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 64 64">
  <!-- back pane (ice, solid for legibility on a dark taskbar) -->
  <rect x="21.9" y="7.5" width="37.4" height="28.8" rx="6.5" fill="#E6E8EB"/>
  <!-- front pane (dark glass, ice outline) -->
  <rect x="4.6" y="27.7" width="37.4" height="28.8" rx="6.5" fill="#0E0F12" stroke="#E6E8EB" stroke-width="2.4"/>
  <!-- mullion -->
  <line x1="10.4" y1="31.6" x2="22.6" y2="31.6" stroke="#E6E8EB" stroke-width="2" stroke-linecap="round"/>
  <!-- gold urgency spine -->
  <rect x="8.2" y="33.4" width="2.6" height="17.3" rx="1.3" fill="#E8B04B"/>
</svg>
